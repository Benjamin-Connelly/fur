{{define "content"}}
<div id="graph" style="width: 100%; height: calc(100vh - 60px);"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
fetch('/__api/graph')
  .then(r => r.json())
  .then(data => renderGraph(data));

function renderGraph(data) {
  if (!data.nodes || data.nodes.length === 0) {
    document.getElementById('graph').innerHTML = '<p style="text-align:center;padding:2rem;color:var(--fg-muted,#666)">No linked files found.</p>';
    return;
  }

  const container = document.getElementById('graph');
  const width = container.clientWidth;
  const height = container.clientHeight;

  const svg = d3.select('#graph').append('svg')
    .attr('width', width)
    .attr('height', height);

  // Zoom support
  const g = svg.append('g');
  svg.call(d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', (event) => g.attr('transform', event.transform)));

  const simulation = d3.forceSimulation(data.nodes)
    .force('link', d3.forceLink(data.links).id(d => d.id).distance(100))
    .force('charge', d3.forceManyBody().strength(-300))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collision', d3.forceCollide(30));

  const link = g.append('g')
    .selectAll('line')
    .data(data.links)
    .join('line')
    .attr('stroke', '#999')
    .attr('stroke-opacity', 0.6)
    .attr('stroke-width', 1);

  const node = g.append('g')
    .selectAll('g')
    .data(data.nodes)
    .join('g')
    .call(d3.drag()
      .on('start', dragstarted)
      .on('drag', dragged)
      .on('end', dragended));

  node.append('circle')
    .attr('r', d => 5 + Math.min(d.links, 10))
    .attr('fill', d => d.isMarkdown ? '#4a9eff' : '#999')
    .attr('stroke', '#fff')
    .attr('stroke-width', 1.5);

  node.append('text')
    .text(d => d.label)
    .attr('dx', 12)
    .attr('dy', 4)
    .style('font-size', '11px')
    .style('fill', 'var(--fg, #333)');

  node.style('cursor', 'pointer')
    .on('click', (event, d) => {
      window.location.href = '/' + d.id;
    });

  node.append('title').text(d => d.id);

  simulation.on('tick', () => {
    link
      .attr('x1', d => d.source.x)
      .attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x)
      .attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
}
</script>
{{end}}
