name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25', '1.26']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
      - run: go test -race -coverprofile=coverage.out ./...
      - run: go tool cover -func=coverage.out | tail -1
      # Coverage ratchet (lookit-9py.2.8): fail if total statement coverage
      # drops below the floor. Raise COVERAGE_FLOOR as lookit-9py.2.1 lifts
      # per-package coverage toward the 85% internal / 60% cmd target.
      - name: Coverage gate
        env:
          COVERAGE_FLOOR: '60'
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "total coverage: ${total}% (floor ${COVERAGE_FLOOR}%)"
          awk -v t="$total" -v f="$COVERAGE_FLOOR" 'BEGIN { exit (t+0 < f+0) ? 1 : 0 }' \
            || { echo "::error::coverage ${total}% is below the ${COVERAGE_FLOOR}% floor"; exit 1; }

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      # Pinned (not @latest) for reproducible audit tooling — see
      # lookit-9py.2.10. gosec + staticcheck are pinned via the golangci-lint
      # v2.11.4 action in the lint job; this pins govulncheck.
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.2.0
      - run: govulncheck ./...

  # Browser-level E2E for web mode (lookit-9py.2.5). Lives in the nested ./e2e
  # module so its Go-1.26 chromedp dependency never bumps the main module's Go
  # version. ubuntu-latest ships google-chrome; the tests skip if it is absent.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Web mode browser E2E
        working-directory: ./e2e
        run: go test ./... -timeout 5m

  # Short fuzzing of every parser/transformer chokepoint on each PR
  # (lookit-9py.2.9 / 1.2). Nightly long-fuzz is a separate workflow.
  fuzz-short:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { pkg: ./internal/sanitize, target: FuzzTerminal }
          - { pkg: ./internal/index, target: FuzzValidatePath }
          - { pkg: ./internal/render, target: FuzzSlugify }
          - { pkg: ./internal/render, target: FuzzMarkdownRender }
          - { pkg: ./internal/remote, target: FuzzParseTarget }
          - { pkg: ./internal/git, target: FuzzNormalizeRemoteURL }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Fuzz ${{ matrix.target }}
        run: go test ${{ matrix.pkg }} -run '^$' -fuzz '^${{ matrix.target }}$' -fuzztime 60s

  compile-check:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.26'
      - name: Cross-compile check
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o /dev/null ./cmd/fur
